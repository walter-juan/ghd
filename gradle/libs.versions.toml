[versions]
kotlin = "2.0.21"
kotlinx-coroutines = "1.9.0"
kotlinx-datetime = "0.6.1"
ksp = "2.0.21-1.0.25"
compose-jetbrains = "1.7.0"
apollo3 = "3.8.5"
kotest = "5.9.1"
kotest-kotlinx-time = "4.4.3"
kotest-property-datetime = "2.0.0"
ktor = "3.0.0"
androidx-navigation = "2.8.0-alpha10"
androidx-lifecycle = "2.8.3"
androidx-room = "2.7.0-alpha04"
androidx-sqlite = "2.5.0-alpha04"
buildconfig = "5.5.0"
gradleVersionUpdates = "0.51.0"
gradleVersionCatalogUpdates = "0.8.4"
logback = "1.5.11"
appdirs = "1.2.2"
kamel = "1.0.0"
kaml = "0.61.0"
semver = "2.0.0"
tinder-statemachine = "0.2.0"
settings = "1.2.0"
icons-tabler = "3.19.0"

[plugins]
# Kotlin for JVM
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
# Serialization/Deserialization
kotlin-plugin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
# kapt, kotlin annotation processor tool
kapt = { id = "org.jetbrains.kotlin.kapt", version.ref = "kotlin" }
# ksp, kotlin symbol processing
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
# Compose multiplatform
compose-jetbrains = { id = "org.jetbrains.compose", version.ref = "compose-jetbrains" }
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
# GraphQL client
apollo3 = { id = "com.apollographql.apollo3", version.ref = "apollo3" }
# Generate BuildConstant
buildconfig = { id = "com.github.gmazzo.buildconfig", version.ref = "buildconfig" }
# Discover dependency updates
gradleVersionUpdates = { id = "com.github.ben-manes.versions", version.ref = "gradleVersionUpdates" }
gradleVersionCatalogUpdates = { id = "nl.littlerobots.version-catalog-update", version.ref = "gradleVersionCatalogUpdates" }
# Android multiplatform, room
androidx-room = { id = "androidx.room", version.ref = "androidx-room" }

[libraries]
# Android multiplatform, navigation
androidx-navigation-compose = { module = "org.jetbrains.androidx.navigation:navigation-compose", version.ref = "androidx-navigation" }
# Android multiplatform, viewmodel
androidx-lifecycle-viewmodel-compose = { module = "org.jetbrains.androidx.lifecycle:lifecycle-viewmodel-compose", version.ref = "androidx-lifecycle" }
# Android multiplatform, room + sqlite
androidx-room-compiler = { module = "androidx.room:room-compiler", version.ref = "androidx-room" }
androidx-room-runtime = { module = "androidx.room:room-runtime", version.ref = "androidx-room" }
androidx-sqlite-bundled = { module = "androidx.sqlite:sqlite-bundled", version.ref = "androidx-sqlite" }
# kotlin coroutines, needed because we are using the main dispatcher
kotlinx-coroutines-swing = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-swing", version.ref = "kotlinx-coroutines" }
# date time kotlin lib
kotlinx-datetime = { module = "org.jetbrains.kotlinx:kotlinx-datetime", version.ref = "kotlinx-datetime" }
# ktor http client (needed for kamel and some API requests)
ktor-client-cio = { module = "io.ktor:ktor-client-cio", version.ref = "ktor" }
ktor-client-logging = { module = "io.ktor:ktor-client-logging", version.ref = "ktor" }
ktor-client-content-negotiation = { module = "io.ktor:ktor-client-content-negotiation", version.ref = "ktor" }
ktor-serialization-kotlinx-json = { module = "io.ktor:ktor-serialization-kotlinx-json", version.ref = "ktor" }
# GraphQL client
apollo3 = { module = "com.apollographql.apollo3:apollo-runtime", version.ref = "apollo3" }
# logger
logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
# cross-platform lib to resolve some application directories for desktop
appdirs = { module = "net.harawata:appdirs", version.ref = "appdirs" }
# kamel, media loading and caching (requires Ktor HttpClient)
kamel = { module = "media.kamel:kamel-image", version.ref = "kamel" }
# YAML support for kotlinx.serialization
kaml = { module = "com.charleskorn.kaml:kaml", version.ref = "kaml" }
# Kotlin's data class for Semantic Versioning 2.0.0 specification (SemVer)
semver = { module = "net.swiftzer.semver:semver", version.ref = "semver" }
# state machine
tinder-statemachine = { module = "com.tinder.statemachine:statemachine", version.ref = "tinder-statemachine" }
# multiplatform library for saving simple key-value data
settings = { module = "com.russhwolf:multiplatform-settings", version.ref = "settings" }
# icons
icons-tabler = { module = "com.woowla.compose.icon.collections:tabler", version.ref = "icons-tabler" }
# kotest runner
test-kotest-runner-junit5 = { module = "io.kotest:kotest-runner-junit5", version.ref = "kotest" }
# kotest property-based testing (right now used only for the data generators)
test-kotest-property = { module = "io.kotest:kotest-property", version.ref = "kotest" }
# kotest assertions
test-kotest-assertions-core = { module = "io.kotest:kotest-assertions-core", version.ref = "kotest" }
# kotest assertions, kotlinx DateTime assertions
test-kotest-assertions-kotlinx-time = { module = "io.kotest:kotest-assertions-kotlinx-time", version.ref = "kotest-kotlinx-time" }
# kotest property-based testing, kotlinx DateTime generators
test-kotest-extensions-property-datetime = { module = "io.kotest.extensions:kotest-property-datetime", version.ref = "kotest-property-datetime" }

[bundles]
ktor-client = [
    "ktor-client-cio",
    "ktor-client-content-negotiation",
    "ktor-client-logging",
    "ktor-serialization-kotlinx-json",
]
test-kotest = [
    "test-kotest-assertions-core",
    "test-kotest-assertions-kotlinx-time",
    "test-kotest-extensions-property-datetime",
    "test-kotest-property",
    "test-kotest-runner-junit5",
]
